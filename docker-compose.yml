services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: kangaroo-backend
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # =============================================
      # DATABASE: Uncomment dòng dưới khi deploy AWS
      # =============================================
      # - ConnectionStrings__DefaultConnection=Server=YOUR_RDS_ENDPOINT;Port=3306;Database=kangaroo_db;User=admin;Password=YOUR_PASSWORD;
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - kangaroo-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # LOCAL: dùng localhost | AWS: đổi thành http://EC2_IP:8080
        VITE_API_URL: "http://localhost:8080"
    container_name: kangaroo-frontend
    ports:
      - "5173:80"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - kangaroo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  kangaroo-network:
    driver: bridge
